name: finalize PR preview version gate update

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.ref == 'fix/pr-preview-version-gate'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/pr-preview-version-gate
          fetch-depth: 0

      - name: Apply verified targeted patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import subprocess

          source = subprocess.run(
              [
                  'git',
                  'show',
                  'e883fb125c742af55d8c0e7e78ed93c25b0ce4cf:.github/workflows/run-pr-preview-version-gate-patch.yml',
              ],
              check=True,
              text=True,
              capture_output=True,
          ).stdout
          start_marker = '          from pathlib import Path\n'
          end_marker = "          PY\n\n          git diff --check"
          start = source.index(start_marker)
          end = source.index(end_marker, start)
          raw_code = source[start:end]
          code = '\n'.join(
              line[10:] if line.startswith('          ') else line
              for line in raw_code.splitlines()
          )
          code = code.replace(
              "    '.github/workflows/run-pr-preview-version-gate-patch.yml',\n",
              '',
          )
          exec(compile(code, 'pr-preview-version-gate-patch.py', 'exec'))
          PY

          rm .github/workflows/finalize-pr-preview-version-gate-patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "ci: decouple PR previews from version gate"
          git push origin HEAD:fix/pr-preview-version-gate
