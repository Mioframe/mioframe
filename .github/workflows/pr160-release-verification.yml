name: PR 160 release verification

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

jobs:
  release-verification:
    if: github.event.pull_request.head.ref == 'fix/pr-preview-version-gate'
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/pr-preview-version-gate
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.BEAVER_CI_AUTOFIX_TOKEN }}

      - name: Fetch pull request base branch
        run: git fetch --no-tags origin "refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}"
        env:
          BASE_REF: ${{ github.base_ref }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Full release verification
        id: release_verify
        shell: bash
        run: |
          set +e
          pnpm verify:release --verbose
          status=$?
          set -e
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"

      - name: Upload release verification logs
        if: steps.release_verify.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: pr160-release-logs
          path: .verify/logs/
          if-no-files-found: ignore
          retention-days: 14

      - name: Remove one-time workflow
        if: always()
        shell: bash
        run: |
          rm .github/workflows/pr160-release-verification.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: remove one-time release verification"
          git push origin HEAD:fix/pr-preview-version-gate

      - name: Require successful release verification
        if: always()
        shell: bash
        env:
          EXIT_CODE: ${{ steps.release_verify.outputs.exit_code }}
        run: exit "${EXIT_CODE:-1}"
