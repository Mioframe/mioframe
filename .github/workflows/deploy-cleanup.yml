name: Clean up PR preview from GitHub Pages

on:
  pull_request:
    types: [closed]

jobs:
  cleanup:
    # Skip fork PRs — they have no write access to publish.
    # Skip PRs targeting main — those are release/promotion PRs; stable Pages
    # deployment is owned exclusively by the release workflow's deploy-stable job.
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.base.ref != 'main'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
    concurrency:
      group: pages-publish
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Remove PR preview from staging
        id: cleanup
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: >-
          node scripts/pages/cleanupPreview.mjs
          --pr ${{ github.event.number }}
          --output-dir pages-staging

      - name: Write root SPA fallback
        if: steps.cleanup.outputs.changed == 'true'
        run: >-
          node scripts/pages/writeSpaFallback.mjs
          --base /${{ github.event.repository.name }}/
          --output-dir pages-staging

      - uses: actions/configure-pages@v4
        if: steps.cleanup.outputs.changed == 'true'
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        if: steps.cleanup.outputs.changed == 'true'
        with:
          path: ./pages-staging/

      - uses: actions/deploy-pages@v4
        if: steps.cleanup.outputs.changed == 'true'
