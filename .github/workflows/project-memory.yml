name: Project Memory

on:
  pull_request:
    paths:
      - '**/AGENTS.md'
      - '.codex/**'
      - '.project-memory/**'
      - 'scripts/project-memory/**'
      - '.husky/pre-commit'
      - '.github/workflows/project-memory.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
  push:
    paths:
      - '**/AGENTS.md'
      - '.codex/**'
      - '.project-memory/**'
      - 'scripts/project-memory/**'
      - '.husky/pre-commit'
      - '.github/workflows/project-memory.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'

permissions:
  contents: read

jobs:
  validate-project-memory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js lts/*
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Review project-memory coverage for the diff
        env:
          MEMORY_DIFF_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: |
          if [ -n "$MEMORY_DIFF_BASE" ] && [ "$MEMORY_DIFF_BASE" != "0000000000000000000000000000000000000000" ]; then
            pnpm memory:task:review --base "$MEMORY_DIFF_BASE"
          else
            pnpm memory:task:review
          fi

      - name: Validate project memory
        run: pnpm memory:validate
